<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial — Construindo o Frontend CRUD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --green: #4ade80;
            --yellow: #facc15;
            --red: #f87171;
            --purple: #a78bfa;
            --orange: #fb923c;
            --pink: #f472b6;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden
        }

        header {
            text-align: center;
            padding: 2.5rem 1rem 1rem;
            position: relative
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -.5px
        }

        header p {
            color: var(--muted);
            font-size: .85rem;
            margin-top: .35rem
        }

        .method-tabs {
            display: flex;
            justify-content: center;
            gap: .5rem;
            padding: 1rem;
            flex-wrap: wrap
        }

        .method-tab {
            padding: .45rem 1.1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .5px;
            transition: all .2s;
            user-select: none;
            position: relative;
        }

        .method-tab:hover {
            border-color: var(--accent);
            color: var(--text)
        }

        .method-tab.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent)
        }

        .method-tab[data-method="SETUP"] {
            --c: var(--accent)
        }

        .method-tab[data-method="HTML"] {
            --c: var(--purple)
        }

        .method-tab[data-method="CSS"] {
            --c: var(--pink)
        }

        .method-tab[data-method="GET"] {
            --c: var(--green)
        }

        .method-tab[data-method="POST"] {
            --c: var(--yellow)
        }

        .method-tab[data-method="DELETE"] {
            --c: var(--red)
        }

        .method-tab[data-method="EDIT"] {
            --c: var(--orange)
        }

        .method-tab.active {
            background: var(--c);
            border-color: var(--c)
        }

        .tab-number {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--bg);
            font-size: .6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg);
        }

        .method-tab[data-method="SETUP"] .tab-number {
            background: var(--accent)
        }

        .method-tab[data-method="HTML"] .tab-number {
            background: var(--purple)
        }

        .method-tab[data-method="CSS"] .tab-number {
            background: var(--pink)
        }

        .method-tab[data-method="GET"] .tab-number {
            background: var(--green)
        }

        .method-tab[data-method="POST"] .tab-number {
            background: var(--yellow);
            color: var(--bg)
        }

        .method-tab[data-method="DELETE"] .tab-number {
            background: var(--red)
        }

        .method-tab[data-method="EDIT"] .tab-number {
            background: var(--orange)
        }

        .flow-container {
            max-width: 540px;
            margin: 0 auto;
            padding: 1rem 1.5rem 3rem;
            position: relative;
        }

        .flow-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--border) 80px, var(--border) calc(100% - 80px), transparent);
            transform: translateX(-1px);
            z-index: 0;
        }

        .step {
            position: relative;
            z-index: 1;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(18px);
            transition: opacity .4s ease, transform .4s ease;
        }

        .step.visible {
            opacity: 1;
            transform: translateY(0)
        }

        .step-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.15rem;
            position: relative;
            overflow: hidden;
            transition: border-color .25s, box-shadow .25s;
        }

        .step-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, .08)
        }

        .step-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--step-color, var(--accent));
            border-radius: 3px 0 0 3px;
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: .6rem;
            margin-bottom: .45rem
        }

        .step-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            flex-shrink: 0;
            background: color-mix(in srgb, var(--step-color, var(--accent)) 15%, transparent);
            color: var(--step-color, var(--accent));
        }

        .step-number {
            position: absolute;
            top: -.45rem;
            right: -.45rem;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--step-color, var(--accent));
            color: var(--bg);
            font-size: .65rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--surface);
        }

        .step-title {
            font-weight: 600;
            font-size: .9rem
        }

        .step-file {
            font-size: .7rem;
            color: var(--muted);
            font-family: 'Fira Code', monospace;
            background: var(--bg);
            padding: .15rem .45rem;
            border-radius: 4px;
            margin-left: auto;
            white-space: nowrap;
        }

        .step-body {
            font-size: .78rem;
            color: var(--muted);
            line-height: 1.55;
            padding-left: 2.4rem
        }

        .step-body code {
            background: var(--bg);
            padding: .1rem .35rem;
            border-radius: 3px;
            font-family: 'Fira Code', monospace;
            font-size: .72rem;
            color: var(--accent);
        }

        .arrow {
            text-align: center;
            position: relative;
            z-index: 1;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--border);
            font-size: .7rem;
        }

        .step-detail {
            margin-top: .5rem;
            padding: .55rem .7rem;
            background: var(--bg);
            border-radius: 6px;
            font-size: .72rem;
            font-family: 'Fira Code', monospace;
            color: var(--green);
            line-height: 1.6;
            margin-left: 2.4rem;
            white-space: pre-wrap;
            border: 1px solid color-mix(in srgb, var(--step-color, var(--accent)) 20%, transparent);
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height .35s ease, opacity .3s ease, margin-top .3s ease;
        }

        .step-detail.open {
            max-height: 3400px;
            opacity: 1
        }

        .toggle-detail {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            font-size: .68rem;
            color: var(--accent);
            cursor: pointer;
            margin-top: .35rem;
            margin-left: 2.4rem;
            user-select: none;
            transition: color .2s;
        }

        .toggle-detail:hover {
            color: var(--text)
        }

        .toggle-detail svg {
            width: 12px;
            height: 12px;
            transition: transform .25s
        }

        .toggle-detail.open svg {
            transform: rotate(90deg)
        }

        .response-box {
            margin-top: .5rem;
            padding: .6rem .8rem;
            border-radius: 8px;
            background: color-mix(in srgb, var(--green) 8%, var(--surface));
            border: 1px solid color-mix(in srgb, var(--green) 25%, transparent);
            margin-left: 2.4rem;
        }

        .response-box .status {
            font-weight: 700;
            font-size: .78rem;
            color: var(--green)
        }

        .response-box pre {
            font-size: .7rem;
            font-family: 'Fira Code', monospace;
            color: var(--muted);
            margin-top: .3rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .tip-box {
            margin-top: .5rem;
            padding: .5rem .7rem;
            border-radius: 8px;
            background: color-mix(in srgb, var(--yellow) 8%, var(--surface));
            border: 1px solid color-mix(in srgb, var(--yellow) 25%, transparent);
            margin-left: 2.4rem;
            font-size: .73rem;
            color: var(--yellow);
            line-height: 1.5;
        }

        .tip-box strong {
            color: var(--yellow)
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            padding: .8rem;
            flex-wrap: wrap;
            margin-top: -.5rem;
            margin-bottom: .5rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: .35rem;
            font-size: .7rem;
            color: var(--muted)
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%
        }

        .section-intro {
            max-width: 540px;
            margin: 0 auto;
            padding: 0 1.5rem .5rem;
            font-size: .8rem;
            color: var(--muted);
            line-height: 1.6;
            text-align: center;
        }

        .section-intro strong {
            color: var(--text)
        }

        @media(max-width:560px) {
            .flow-container {
                padding: 1rem
            }

            .step-file {
                display: none
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Tutorial: Construindo o Frontend CRUD</h1>
        <p>Passo a passo — do zero até a interface completa consumindo a API PHP</p>
    </header>

    <div class="method-tabs" id="tabs">
        <div class="method-tab active" data-method="SETUP"><span class="tab-number">1</span>Setup</div>
        <div class="method-tab" data-method="HTML"><span class="tab-number">2</span>HTML</div>
        <div class="method-tab" data-method="CSS"><span class="tab-number">3</span>CSS</div>
        <div class="method-tab" data-method="GET"><span class="tab-number">4</span>Listar</div>
        <div class="method-tab" data-method="POST"><span class="tab-number">5</span>Criar</div>
        <div class="method-tab" data-method="DELETE"><span class="tab-number">6</span>Deletar</div>
        <div class="method-tab" data-method="EDIT"><span class="tab-number">7</span>Editar</div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--accent)"></div> Conceito
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--purple)"></div> Estrutura
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--yellow)"></div> Explicação
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--orange)"></div> Código
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--green)"></div> Resultado
        </div>
    </div>

    <div class="section-intro" id="intro"></div>

    <div class="flow-container">
        <div class="flow-line"></div>
        <div id="flow"></div>
    </div>

    <script>
        const bt = String.fromCharCode(96);
        const flows = {

            // ═══════════════════════════════════════
            // ETAPA 1 — SETUP
            // ═══════════════════════════════════════
            SETUP: {
                intro: 'Antes de escrever qualquer código, vamos <strong>organizar o projeto</strong> e entender o que será necessário.',
                steps: [
                    {
                        icon: '&#128161;', title: 'O que vamos construir?', file: '',
                        color: 'var(--accent)',
                        body: 'Uma interface web que consome uma <strong>API REST em PHP</strong>. O frontend será feito com <strong>JavaScript puro</strong> (Vanilla JS) usando <strong>ES Modules</strong> e <strong>Bootstrap 5</strong> para estilização.',
                        tip: 'Pré-requisito: a API PHP deve estar rodando em <code>http://localhost:8000</code>. Inicie-a com <code>php -S localhost:8000</code> dentro da pasta <code>/api</code>.',
                    },
                    {
                        icon: '&#128193;', title: 'Crie a estrutura de pastas', file: 'terminal',
                        color: 'var(--purple)',
                        body: 'Dentro da pasta <code>frontend/</code>, crie a seguinte árvore de diretórios. Cada pasta tem uma responsabilidade clara.',
                        detail: `frontend/\n└── src/\n    ├── index.html          ← página principal\n    ├── app.js              ← orquestrador (imports + lógica)\n    ├── styles/\n    │   ├── reset.css        ← CSS reset moderno\n    │   └── style.css        ← estilos personalizados\n    └── scripts/\n        ├── api/\n        │   ├── read.js      ← GET (listar)\n        │   ├── create.js    ← POST (criar)\n        │   ├── update.js    ← PUT + PATCH (editar)\n        │   └── delete.js    ← DELETE (deletar)\n        └── dom/\n            └── render.js    ← renderização dos cards`,
                    },
                    {
                        icon: '&#9881;', title: 'Entenda a arquitetura', file: '',
                        color: 'var(--yellow)',
                        body: 'Separamos o código em <strong>camadas</strong>: os arquivos em <code>scripts/api/</code> só fazem <code>fetch</code> (comunicam com o servidor). O arquivo <code>scripts/dom/render.js</code> só manipula o DOM (visual). O <code>app.js</code> orquestra tudo.',
                        tip: '<strong>Por que separar?</strong> Cada arquivo tem uma única responsabilidade. Se a API mudar, você altera só a pasta <code>api/</code>. Se o layout mudar, altera só <code>render.js</code>. Isso é o princípio da <strong>Separação de Responsabilidades</strong>.',
                    },
                    {
                        icon: '&#128230;', title: 'ES Modules', file: '',
                        color: 'var(--yellow)',
                        body: 'Usamos <code>&lt;script type="module"&gt;</code> no HTML. Isso ativa o sistema de módulos nativo do navegador: cada arquivo pode <code>export</code> funções e outro pode <code>import</code>.',
                        detail: `// create.js exporta uma função:\nexport async function createUser(apiUrl, data) { ... }\n\n// app.js importa ela:\nimport { createUser } from './scripts/api/create.js';`,
                        tip: '<strong>Vantagem:</strong> sem precisar de bundler (Webpack, Vite). O navegador resolve os imports sozinho. Cada arquivo é carregado automaticamente.',
                    },
                    {
                        icon: '&#10003;', title: 'Pronto para começar!', file: '',
                        color: 'var(--green)',
                        body: 'Com a estrutura de pastas criada e os conceitos entendidos, vamos para a próxima etapa: construir o <strong>HTML</strong>.',
                        response: { status: 'Estrutura Criada', body: 'frontend/src/\n├── index.html       (vazio por enquanto)\n├── app.js           (vazio por enquanto)\n├── styles/          (vazio por enquanto)\n└── scripts/api/ + dom/  (vazio por enquanto)' },
                    },
                ],
            },

            // ═══════════════════════════════════════
            // ETAPA 2 — HTML
            // ═══════════════════════════════════════
            HTML: {
                intro: 'Vamos construir o <strong>index.html</strong> — a estrutura visual da aplicação usando Bootstrap 5.',
                steps: [
                    {
                        icon: '&#128196;', title: 'Esqueleto do HTML', file: 'index.html',
                        color: 'var(--accent)',
                        body: 'Comece com a estrutura básica: <code>&lt;!DOCTYPE html&gt;</code>, meta tags, e os links para CSS. Usamos <strong>3 folhas de estilo</strong> em ordem específica.',
                        detail: `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport"\n    content="width=device-width, initial-scale=1.0">\n  <title>CRUD JS Project<\/title>\n\n  <!-- 1. Nosso reset primeiro -->\n  <link rel="stylesheet" href="styles/reset.css">\n\n  <!-- 2. Bootstrap via CDN -->\n  <link href="https://cdn.jsdelivr.net/npm/\n    bootstrap@5.3.8/dist/css/bootstrap.min.css"\n    rel="stylesheet">\n\n  <!-- 3. Nosso CSS por último (sobrescreve) -->\n  <link rel="stylesheet" href="styles/style.css">\n<\/head>\n<body>\n  <!-- conteúdo aqui -->\n<\/body>\n<\/html>`,
                        tip: '<strong>Ordem importa!</strong> O reset.css normaliza o comportamento padrão, o Bootstrap adiciona os componentes, e o style.css permite que você sobrescreva o que precisar.',
                    },
                    {
                        icon: '&#9776;', title: 'Header da página', file: 'index.html',
                        color: 'var(--purple)',
                        body: 'Adicione um cabeçalho escuro com o título do projeto usando classes do Bootstrap.',
                        detail: `<body>\n  <header class="bg-dark text-white py-4 mb-4">\n    <h1 class="text-center m-0">PHP/JS CRUD Project<\/h1>\n  <\/header>\n\n  <main class="container">\n    <!-- seções aqui -->\n  <\/main>\n<\/body>`,
                    },
                    {
                        icon: '&#127922;', title: 'Seção de usuários (cards)', file: 'index.html',
                        color: 'var(--purple)',
                        body: 'Crie um card com uma <code>&lt;div id="users"&gt;</code> vazia. É aqui que o JavaScript vai inserir os cards de cada usuário dinamicamente.',
                        detail: `<main class="container">\n  <section class="card p-4 mb-4">\n    <h2 class="mb-3">Users</h2>\n    <div class="row g-3" id="users">\n      <!-- cards serão inseridos pelo JS -->\n    </div>\n  </section>\n\n  <!-- formulário vem aqui -->\n</main>`,
                        tip: '<strong>id="users"</strong> é essencial — o JavaScript usa esse id para encontrar onde inserir os cards. A classe <code>row g-3</code> cria um grid responsivo do Bootstrap.',
                    },
                    {
                        icon: '&#9998;', title: 'Formulário de criação', file: 'index.html',
                        color: 'var(--purple)',
                        body: 'Adicione o formulário com 3 campos (<code>name</code>, <code>age</code>, <code>email</code>), um botão de submit e um botão Cancel (inicialmente escondido, usado na edição).',
                        detail: `<section class="card p-4">\n  <h2 class="mb-3" id="form-title">Create User</h2>\n\n  <!-- Alerta de erro (escondido por padrão) -->\n  <div id="form-error"\n    class="alert alert-danger d-none"\n    role="alert"></div>\n\n  <form id="create-user-form"\n    class="row g-3 align-items-end">\n\n    <div class="col-md-4">\n      <label for="name" class="form-label">Name</label>\n      <input type="text" class="form-control"\n        id="name" name="name" required>\n    </div>\n\n    <div class="col-md-3">\n      <label for="age" class="form-label">Age</label>\n      <input type="number" class="form-control"\n        id="age" name="age" required>\n    </div>\n\n    <div class="col-md-3">\n      <label for="email" class="form-label">Email</label>\n      <input type="email" class="form-control"\n        id="email" name="email" required>\n    </div>\n\n    <div class="col-md-2 d-flex gap-2">\n      <button type="submit"\n        class="btn btn-dark flex-fill">Create</button>\n      <button type="button" id="cancel-edit"\n        class="btn btn-outline-secondary"\n        style="display:none;">Cancel</button>\n    </div>\n  </form>\n</section>`,
                        tip: '<strong>IDs importantes:</strong> <code>form-title</code> muda de "Create" para "Edit". <code>form-error</code> mostra erros da API. <code>cancel-edit</code> fica escondido até entrar no modo de edição.',
                    },
                    {
                        icon: '&#9889;', title: 'Carregue o app.js como module', file: 'index.html',
                        color: 'var(--orange)',
                        body: 'Antes de fechar o <code>&lt;/body&gt;</code>, adicione o script principal. O <code>type="module"</code> ativa ES Modules e garante que o script execute após o DOM estar pronto.',
                        detail: `  <!-- Antes de <\/body> -->\n  <script type="module" src="app.js"><\/script>\n<\/body>\n<\/html>`,
                        tip: 'Scripts do tipo <code>module</code> são automaticamente <strong>defer</strong> — executam após o HTML ser parseado. Por isso não precisamos de <code>DOMContentLoaded</code> para os imports, mas usamos para a renderização inicial.',
                    },
                    {
                        icon: '&#10003;', title: 'HTML completo!', file: '',
                        color: 'var(--green)',
                        body: 'O HTML está pronto. Se abrir no navegador agora, vai ver o layout com header, card vazio e formulário — mas sem funcionalidade ainda.',
                        response: { status: 'Visual base pronto', body: '┌──────────────────────────────────┐\n│      PHP/JS CRUD Project         │\n├──────────────────────────────────┤\n│  Users                           │\n│  (vazio — JS ainda não roda)     │\n│  ──────────────────────────────  │\n│  Name [___] Age [__] Email [___] │\n│  [Create]                        │\n└──────────────────────────────────┘' },
                    },
                ],
            },

            // ═══════════════════════════════════════
            // ETAPA 3 — CSS
            // ═══════════════════════════════════════
            CSS: {
                intro: 'Dois arquivos CSS pequenos mas importantes: um <strong>reset moderno</strong> e os <strong>estilos customizados</strong>.',
                steps: [
                    {
                        icon: '&#128161;', title: 'Por que usar um CSS Reset?', file: '',
                        color: 'var(--accent)',
                        body: 'Cada navegador tem estilos padrão diferentes (margens, fontes, tamanhos). O reset normaliza tudo para que seu CSS funcione de forma consistente em qualquer browser.',
                    },
                    {
                        icon: '&#127912;', title: 'Crie o reset.css', file: 'styles/reset.css',

                        color: 'var(--green)',
                        body: 'Todas as operações CRUD estão funcionando! Teste: (1) edite só o email → veja PATCH no DevTools. (2) edite tudo → veja PUT. (3) clique Edit e depois Cancel. (4) delete um usuário que está sendo editado.',
                        response: { status: 'CRUD Completo!', body: 'Funcionalidades implementadas:\n\n✓ Listar usuários (GET)\n✓ Criar usuário (POST)\n✓ Deletar com confirmação (DELETE)\n✓ Editar com PUT ou PATCH inteligente\n✓ Tratamento de erros\n✓ Modo edição com Cancel\n\nArquivos criados:\n  src/index.html\n  src/app.js\n  src/styles/reset.css\n  src/styles/style.css\n  src/scripts/api/read.js\n  src/scripts/api/create.js\n  src/scripts/api/update.js\n  src/scripts/api/delete.js\n  src/scripts/dom/render.js' },
                    },
                ],
            },
        };

        const flowEl = document.getElementById('flow');
        const introEl = document.getElementById('intro');
        const tabs = document.querySelectorAll('.method-tab');
        let current = 'SETUP';

        function render(method) {
            const flow = flows[method];
            const steps = flow.steps;

            introEl.innerHTML = flow.intro || '';
            flowEl.innerHTML = '';

            steps.forEach((s, i) => {
                if (i > 0) {
                    const arrow = document.createElement('div');
                    arrow.className = 'arrow';
                    arrow.innerHTML = '&#9660;';
                    flowEl.appendChild(arrow);
                }

                const div = document.createElement('div');
                div.className = 'step';
                div.style.transitionDelay = `${i * 70}ms`;

                let inner = `
      <div class="step-card" style="--step-color:${s.color}">
        <div class="step-number">${i + 1}</div>
        <div class="step-header">
          <div class="step-icon">${s.icon}</div>
          <div class="step-title">${s.title}</div>
          ${s.file ? `<div class="step-file">${s.file}</div>` : ''}
        </div>
        <div class="step-body">${s.body}</div>`;

                if (s.detail) {
                    const uid = `detail-${method}-${i}`;
                    inner += `
        <div class="toggle-detail" onclick="toggleDetail('${uid}',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5l7 7-7 7"/></svg>
          ver código
        </div>
        <div class="step-detail" id="${uid}"><span style="color:var(--muted)">${escHtml(s.detail)}</span></div>`;
                }

                if (s.tip) {
                    inner += `<div class="tip-box">${s.tip}</div>`;
                }

                if (s.response) {
                    inner += `
        <div class="response-box">
          <div class="status">${s.response.status}</div>
          <pre>${escHtml(s.response.body)}</pre>
        </div>`;
                }

                inner += '</div>';
                div.innerHTML = inner;
                flowEl.appendChild(div);
            });

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    document.querySelectorAll('.step').forEach(el => el.classList.add('visible'));
                });
            });
        }

        function toggleDetail(id, btn) {
            const el = document.getElementById(id);
            el.classList.toggle('open');
            btn.classList.toggle('open');
        }

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                current = tab.dataset.method;
                render(current);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        render('SETUP');
    </script>
</body>

</html>
