<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo de Execução — Frontend</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f172a;--surface:#1e293b;--border:#334155;
    --text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;
    --green:#4ade80;--yellow:#facc15;--red:#f87171;--purple:#a78bfa;
    --orange:#fb923c;--pink:#f472b6;
  }
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

  header{text-align:center;padding:2.5rem 1rem 1rem;position:relative}
  header h1{font-size:1.6rem;font-weight:700;letter-spacing:-.5px}
  header p{color:var(--muted);font-size:.85rem;margin-top:.35rem}

  .method-tabs{display:flex;justify-content:center;gap:.5rem;padding:1rem;flex-wrap:wrap}
  .method-tab{
    padding:.45rem 1.1rem;border-radius:8px;border:1px solid var(--border);
    background:var(--surface);color:var(--muted);cursor:pointer;font-size:.8rem;
    font-weight:600;letter-spacing:.5px;transition:all .2s;user-select:none;
  }
  .method-tab:hover{border-color:var(--accent);color:var(--text)}
  .method-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .method-tab[data-method="LOAD"]{--c:var(--accent)}
  .method-tab[data-method="CREATE"]{--c:var(--green)}
  .method-tab[data-method="EDIT_PUT"]{--c:var(--orange)}
  .method-tab[data-method="EDIT_PATCH"]{--c:var(--purple)}
  .method-tab[data-method="DELETE"]{--c:var(--red)}
  .method-tab.active{background:var(--c);border-color:var(--c)}

  .flow-container{
    max-width:520px;margin:0 auto;padding:1rem 1.5rem 3rem;position:relative;
  }

  .flow-line{
    position:absolute;left:50%;top:0;bottom:0;width:2px;
    background:linear-gradient(to bottom,transparent,var(--border) 80px,var(--border) calc(100% - 80px),transparent);
    transform:translateX(-1px);z-index:0;
  }

  .step{
    position:relative;z-index:1;margin-bottom:1rem;
    opacity:0;transform:translateY(18px);
    transition:opacity .4s ease,transform .4s ease;
  }
  .step.visible{opacity:1;transform:translateY(0)}

  .step-card{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:1rem 1.15rem;position:relative;overflow:hidden;
    transition:border-color .25s,box-shadow .25s;
  }
  .step-card:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(56,189,248,.08)}

  .step-card::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--step-color,var(--accent));border-radius:3px 0 0 3px;
  }

  .step-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.45rem}
  .step-icon{
    width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:.85rem;flex-shrink:0;
    background:color-mix(in srgb,var(--step-color,var(--accent)) 15%,transparent);
    color:var(--step-color,var(--accent));
  }
  .step-title{font-weight:600;font-size:.9rem}
  .step-file{
    font-size:.7rem;color:var(--muted);font-family:'Fira Code',monospace;
    background:var(--bg);padding:.15rem .45rem;border-radius:4px;margin-left:auto;
    white-space:nowrap;
  }

  .step-body{font-size:.78rem;color:var(--muted);line-height:1.55;padding-left:2.4rem}
  .step-body code{
    background:var(--bg);padding:.1rem .35rem;border-radius:3px;
    font-family:'Fira Code',monospace;font-size:.72rem;color:var(--accent);
  }

  .arrow{
    text-align:center;position:relative;z-index:1;height:18px;
    display:flex;align-items:center;justify-content:center;color:var(--border);font-size:.7rem;
  }

  .step-detail{
    margin-top:.5rem;padding:.55rem .7rem;background:var(--bg);border-radius:6px;
    font-size:.72rem;font-family:'Fira Code',monospace;color:var(--green);
    line-height:1.6;margin-left:2.4rem;white-space:pre-wrap;
    border:1px solid color-mix(in srgb,var(--step-color,var(--accent)) 20%,transparent);
    max-height:0;overflow:hidden;opacity:0;
    transition:max-height .35s ease,opacity .3s ease,margin-top .3s ease;
  }
  .step-detail.open{max-height:500px;opacity:1}

  .toggle-detail{
    display:inline-flex;align-items:center;gap:.3rem;
    font-size:.68rem;color:var(--accent);cursor:pointer;margin-top:.35rem;
    margin-left:2.4rem;user-select:none;transition:color .2s;
  }
  .toggle-detail:hover{color:var(--text)}
  .toggle-detail svg{width:12px;height:12px;transition:transform .25s}
  .toggle-detail.open svg{transform:rotate(90deg)}

  .response-box{
    margin-top:.5rem;padding:.6rem .8rem;border-radius:8px;
    background:color-mix(in srgb,var(--green) 8%,var(--surface));
    border:1px solid color-mix(in srgb,var(--green) 25%,transparent);
    margin-left:2.4rem;
  }
  .response-box .status{font-weight:700;font-size:.78rem;color:var(--green)}
  .response-box pre{
    font-size:.7rem;font-family:'Fira Code',monospace;color:var(--muted);
    margin-top:.3rem;line-height:1.5;white-space:pre-wrap;
  }

  .legend{
    display:flex;justify-content:center;gap:1.2rem;padding:.8rem;flex-wrap:wrap;
    margin-top:-.5rem;margin-bottom:.5rem;
  }
  .legend-item{display:flex;align-items:center;gap:.35rem;font-size:.7rem;color:var(--muted)}
  .legend-dot{width:8px;height:8px;border-radius:50%}

  @media(max-width:560px){
    .flow-container{padding:1rem}
    .step-file{display:none}
  }
</style>
</head>
<body>

<header>
  <h1>Fluxo de Execução do Frontend</h1>
  <p>Da interação do usuário no navegador até a atualização do DOM</p>
</header>

<div class="method-tabs" id="tabs">
  <div class="method-tab active" data-method="LOAD">Carregar</div>
  <div class="method-tab" data-method="CREATE">Criar</div>
  <div class="method-tab" data-method="EDIT_PUT">Editar (PUT)</div>
  <div class="method-tab" data-method="EDIT_PATCH">Editar (PATCH)</div>
  <div class="method-tab" data-method="DELETE">Deletar</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Evento</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> App Logic</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Decisão</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Fetch API</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div> DOM</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Resultado</div>
</div>

<div class="flow-container">
  <div class="flow-line"></div>
  <div id="flow"></div>
</div>

<script>
const flows = {
  LOAD: [
    {
      icon: '&#9656;', title: 'DOMContentLoaded', file: 'app.js',
      color: 'var(--accent)',
      body: 'O navegador termina de carregar o HTML. O evento <code>DOMContentLoaded</code> dispara e chama <code>renderUsers(apiUrl)</code> diretamente.',
      detail: `document.addEventListener('DOMContentLoaded', () => renderUsers(apiUrl));`,
    },
    {
      icon: '&#9776;', title: 'renderUsers()', file: 'render.js',
      color: 'var(--pink)',
      body: 'Recebe apenas a URL. Chama <code>getUsers()</code> para buscar os dados na API e armazena o resultado em <code>usersCache</code> para consulta posterior.',
      detail: `export async function renderUsers(apiUrl) {\n  const users = await getUsers(apiUrl);\n  usersCache = users;\n  const usersSection = document.getElementById('users');\n\n  if (users.length === 0) {\n    usersSection.innerHTML =\n      '<p class="text-muted">No users found.</p>';\n    return;\n  }\n\n  usersSection.innerHTML = '';\n\n  users.forEach((user) => {\n    const userDiv = document.createElement('div');\n    userDiv.classList.add('col-md-3');\n\n    userDiv.innerHTML = \\\`\n      <div class="card user-card h-100" id="\\\${user.id}">\n        <div class="card-body">\n          <h5 class="card-title">\\\${user.name}</h5>\n          <p class="card-text mb-1">\n            <strong>Age:</strong> \\\${user.age}\n          </p>\n          <p class="card-text">\n            <strong>Email:</strong> \\\${user.email}\n          </p>\n        </div>\n        <div class="card-footer d-flex gap-2">\n          <button class="btn btn-sm btn-outline-dark flex-fill"\n                  data-action="edit">Edit</button>\n          <button class="btn btn-sm btn-outline-danger flex-fill"\n                  data-action="delete">Delete</button>\n        </div>\n      </div>\\\`;\n\n    usersSection.appendChild(userDiv);\n  });\n}`,
    },
    {
      icon: '&#10147;', title: 'getUsers() — fetch GET', file: 'read.js',
      color: 'var(--orange)',
      body: 'Faz <code>fetch(apiUrl)</code> com método <code>GET</code> para buscar a lista de usuários na API.',
      detail: `export async function getUsers(apiUrl) {\n  const response = await fetch(apiUrl);\n  const data = await response.json();\n\n  if (!response.ok) {\n    throw new Error(data.error || 'Failed to fetch users');\n  }\n\n  return data.users;\n}`,
    },
    {
      icon: '&#8644;', title: 'API responde', file: '',
      color: 'var(--orange)',
      body: 'A API retorna <code>200 OK</code> com o JSON <code>{ "users": [...] }</code>. O <code>getUsers()</code> extrai e retorna o array <code>data.users</code>.',
      response: { status: '200 OK', body: '{\n  "users": [\n    { "name": "João", "age": 25,\n      "email": "joao@email.com", "id": 1 }\n  ]\n}' },
    },
    {
      icon: '&#9638;', title: 'Renderiza os cards', file: 'render.js',
      color: 'var(--pink)',
      body: 'Para cada usuário, cria um card Bootstrap com nome, idade, email e botões <code>Edit</code> e <code>Delete</code>. O card usa a classe <code>user-card</code> e o <code>id</code> do usuário como atributo <code>id</code> do elemento.',
      detail: `users.forEach((user) => {\n  const userDiv = document.createElement('div');\n  userDiv.classList.add('col-md-3');\n  userDiv.innerHTML = \`\n    <div class="card user-card h-100" id="\${user.id}">\n      <div class="card-body">\n        <h5 class="card-title">\${user.name}</h5>\n        <p class="card-text mb-1"><strong>Age:</strong> \${user.age}</p>\n        <p class="card-text"><strong>Email:</strong> \${user.email}</p>\n      </div>\n      <div class="card-footer d-flex gap-2">\n        <button class="btn btn-sm btn-outline-dark flex-fill"\n                data-action="edit">Edit</button>\n        <button class="btn btn-sm btn-outline-danger flex-fill"\n                data-action="delete">Delete</button>\n      </div>\n    </div>\`;\n\n  usersSection.appendChild(userDiv);\n});`,
    },
    {
      icon: '&#10003;', title: 'UI atualizada', file: '',
      color: 'var(--green)',
      body: 'Os cards são exibidos na tela. Os dados dos usuários ficam em cache no <code>usersCache</code> (em <code>render.js</code>). Os cliques em <code>Edit</code> e <code>Delete</code> são capturados por event delegation no <code>#users</code> via <code>data-action</code> (definido no <code>app.js</code>).',
    },
  ],

  CREATE: [
    {
      icon: '&#9656;', title: 'Usuário preenche o formulário', file: 'index.html',
      color: 'var(--accent)',
      body: 'O usuário insere <code>name</code>, <code>age</code> e <code>email</code> nos campos do formulário e clica em <code>Create</code>.',
      detail: `<form id="create-user-form">\n  <input type="text" id="name" required>\n  <input type="number" id="age" required>\n  <input type="email" id="email" required>\n  <button type="submit">Create</button>\n</form>`,
    },
    {
      icon: '&#9881;', title: 'Evento submit', file: 'app.js',
      color: 'var(--accent)',
      body: 'O listener de <code>submit</code> captura o evento, previne o reload da página e coleta os valores dos campos.',
      detail: `form.addEventListener('submit', async (event) => {\n  event.preventDefault();\n\n  const name = document.getElementById('name').value;\n  const age = document.getElementById('age').value;\n  const email = document.getElementById('email').value;\n\n  hideError();\n\n  try {\n    if (editingId !== null) {\n      const changed = {};\n      if (name !== originalUser.name) changed.name = name;\n      if (Number(age) !== originalUser.age) changed.age = age;\n      if (email !== originalUser.email) changed.email = email;\n\n      if (Object.keys(changed).length === 0) {\n        exitEditMode();\n        return;\n      }\n\n      const allChanged = Object.keys(changed).length === 3;\n      if (allChanged) {\n        await updateUser(apiUrl, editingId, { name, age, email });\n      } else {\n        await patchUser(apiUrl, editingId, changed);\n      }\n    } else {\n      await createUser(apiUrl, { name, age, email });\n    }\n\n    exitEditMode();\n    renderUsers(apiUrl);\n  } catch (error) {\n    showError(error.message);\n  }\n});`,
    },
    {
      icon: '&#10004;', title: 'Verifica modo de edição', file: 'app.js',
      color: 'var(--yellow)',
      body: 'Checa se <code>editingId</code> é <code>null</code>. Como estamos criando, o fluxo segue para <code>createUser()</code>.',
      detail: `if (editingId !== null) {\n  // fluxo de edição (PUT ou PATCH)\n} else {\n  // editingId === null → criação\n  await createUser(apiUrl, { name, age, email });\n}`,
    },
    {
      icon: '&#10147;', title: 'createUser() — fetch POST', file: 'create.js',
      color: 'var(--orange)',
      body: 'Envia <code>POST /api/users</code> com o corpo JSON. Converte <code>age</code> para <code>Number</code> antes de enviar.',
      detail: `export async function createUser(apiUrl, { name, age, email }) {\n  const response = await fetch(apiUrl, {\n    method: 'POST',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify({ name, age: Number(age), email }),\n  });\n\n  const data = await response.json();\n\n  if (!response.ok) {\n    throw new Error(data.error || 'Failed to create user');\n  }\n\n  return data;\n}`,
    },
    {
      icon: '&#8644;', title: 'API responde', file: '',
      color: 'var(--orange)',
      body: 'A API valida os campos e retorna <code>201 Created</code> com o usuário criado (incluindo o <code>id</code> gerado).',
      response: { status: '201 Created', body: '{\n  "name": "Ana", "age": 30,\n  "email": "ana@email.com", "id": 2\n}' },
    },
    {
      icon: '&#8635;', title: 'exitEditMode() + renderUsers()', file: 'app.js',
      color: 'var(--purple)',
      body: 'Limpa o formulário com <code>form.reset()</code> e chama <code>renderUsers(apiUrl)</code> para recarregar a lista de cards.',
      detail: `function exitEditMode() {\n  editingId = null;\n  originalUser = null;\n  formTitle.textContent = 'Create User';\n  submitBtn.textContent = 'Create';\n  cancelBtn.style.display = 'none';\n  form.reset();\n}\n\nexitEditMode();\nrenderUsers(apiUrl);`,
    },
    {
      icon: '&#10003;', title: 'Novo card aparece na tela', file: '',
      color: 'var(--green)',
      body: 'A lista é re-renderizada com o novo usuário. O formulário volta ao estado inicial de criação.',
    },
  ],

  EDIT_PUT: [
    {
      icon: '&#9656;', title: 'Clique no botão Edit', file: 'app.js',
      color: 'var(--accent)',
      body: 'O usuário clica em <code>Edit</code> no card. O event delegation no <code>#users</code> captura o clique via <code>data-action</code> e busca os dados do usuário no <code>usersCache</code> via <code>getUserFromCard()</code> → <code>findUserById()</code>.',
      detail: `usersSection.addEventListener('click', async (event) => {\n  const { target } = event;\n\n  if (target.dataset.action === 'edit') {\n    enterEditMode(getUserFromCard(target));\n  }\n});\n\nfunction getUserFromCard(button) {\n  const card = button.closest('.user-card');\n  return findUserById(Number(card.id));\n}`,
    },
    {
      icon: '&#9638;', title: 'enterEditMode(user)', file: 'app.js',
      color: 'var(--purple)',
      body: 'Salva o <code>id</code> em <code>editingId</code> e uma cópia do usuário em <code>originalUser</code>. Preenche o formulário e muda o botão para <code>Update</code>.',
      detail: `function enterEditMode(user) {\n  editingId = user.id;\n  originalUser = { ...user };\n  document.getElementById('name').value = user.name;\n  document.getElementById('age').value = user.age;\n  document.getElementById('email').value = user.email;\n  formTitle.textContent = 'Edit User';\n  submitBtn.textContent = 'Update';\n  cancelBtn.style.display = '';\n  document.getElementById('name').focus();\n}`,
    },
    {
      icon: '&#9881;', title: 'Usuário altera TODOS os campos', file: 'index.html',
      color: 'var(--accent)',
      body: 'O usuário modifica os 3 campos (<code>name</code>, <code>age</code> e <code>email</code>) e clica em <code>Update</code>.',
    },
    {
      icon: '&#10004;', title: 'Detecção de mudanças (diff)', file: 'app.js',
      color: 'var(--yellow)',
      body: 'Compara cada campo com <code>originalUser</code>. Como os <strong>3 campos</strong> mudaram, <code>allChanged</code> é <code>true</code> → usa <code>PUT</code>.',
      detail: `const changed = {};\nif (name !== originalUser.name) changed.name = name;\nif (Number(age) !== originalUser.age) changed.age = age;\nif (email !== originalUser.email) changed.email = email;\n\nif (Object.keys(changed).length === 0) {\n  exitEditMode(); // nada mudou\n  return;\n}\n\nconst allChanged = Object.keys(changed).length === 3;\n// allChanged === true → PUT`,
    },
    {
      icon: '&#10147;', title: 'updateUser() — fetch PUT', file: 'update.js',
      color: 'var(--orange)',
      body: 'Envia <code>PUT /api/users?id=1</code> com <strong>todos</strong> os campos no corpo. Converte <code>age</code> para <code>Number</code>.',
      detail: `export async function updateUser(apiUrl, id, { name, age, email }) {\n  const response = await fetch(\`\${apiUrl}?id=\${id}\`, {\n    method: 'PUT',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify({ name, age: Number(age), email }),\n  });\n\n  const data = await response.json();\n\n  if (!response.ok) {\n    throw new Error(data.error || 'Failed to update user');\n  }\n\n  return data;\n}`,
    },
    {
      icon: '&#8644;', title: 'API responde', file: '',
      color: 'var(--orange)',
      body: 'A API valida todos os campos, atualiza o usuário e retorna <code>200 OK</code>.',
      response: { status: '200 OK', body: '{\n  "name": "João Silva", "age": 26,\n  "email": "joao.silva@email.com", "id": 1\n}' },
    },
    {
      icon: '&#8635;', title: 'exitEditMode() + renderUsers()', file: 'app.js',
      color: 'var(--purple)',
      body: 'Limpa <code>editingId</code> e <code>originalUser</code>, restaura o formulário ao modo de criação e re-renderiza a lista.',
      detail: `exitEditMode();\nrenderUsers(apiUrl);`,
    },
    {
      icon: '&#10003;', title: 'Card atualizado na tela', file: '',
      color: 'var(--green)',
      body: 'A lista é re-renderizada com os dados atualizados. O formulário volta ao estado <code>Create User</code>.',
    },
  ],

  EDIT_PATCH: [
    {
      icon: '&#9656;', title: 'Clique no botão Edit', file: 'app.js',
      color: 'var(--accent)',
      body: 'O usuário clica em <code>Edit</code> no card. O event delegation no <code>#users</code> captura o clique via <code>data-action</code> e busca os dados do usuário no <code>usersCache</code> via <code>getUserFromCard()</code> → <code>findUserById()</code>.',
      detail: `usersSection.addEventListener('click', async (event) => {\n  const { target } = event;\n\n  if (target.dataset.action === 'edit') {\n    enterEditMode(getUserFromCard(target));\n  }\n});\n\nfunction getUserFromCard(button) {\n  const card = button.closest('.user-card');\n  return findUserById(Number(card.id));\n}`,
    },
    {
      icon: '&#9638;', title: 'enterEditMode(user)', file: 'app.js',
      color: 'var(--purple)',
      body: 'Salva o <code>id</code> em <code>editingId</code> e uma cópia do usuário em <code>originalUser</code>. Preenche o formulário e muda o botão para <code>Update</code>.',
      detail: `function enterEditMode(user) {\n  editingId = user.id;\n  originalUser = { ...user };\n  document.getElementById('name').value = user.name;\n  document.getElementById('age').value = user.age;\n  document.getElementById('email').value = user.email;\n  formTitle.textContent = 'Edit User';\n  submitBtn.textContent = 'Update';\n  cancelBtn.style.display = '';\n  document.getElementById('name').focus();\n}`,
    },
    {
      icon: '&#9881;', title: 'Usuário altera ALGUNS campos', file: 'index.html',
      color: 'var(--accent)',
      body: 'O usuário modifica apenas <strong>1 ou 2</strong> campos (ex: só a <code>age</code>) e clica em <code>Update</code>.',
    },
    {
      icon: '&#10004;', title: 'Detecção de mudanças (diff)', file: 'app.js',
      color: 'var(--yellow)',
      body: 'Compara cada campo com <code>originalUser</code>. Como mudaram <strong>menos de 3</strong> campos, <code>allChanged</code> é <code>false</code> → usa <code>PATCH</code>.',
      detail: `const changed = {};\nif (name !== originalUser.name) changed.name = name;\nif (Number(age) !== originalUser.age) changed.age = age;\nif (email !== originalUser.email) changed.email = email;\n\n// changed = { age: "27" } → só 1 campo\nconst allChanged = Object.keys(changed).length === 3;\n// allChanged === false → PATCH`,
    },
    {
      icon: '&#10147;', title: 'patchUser() — fetch PATCH', file: 'update.js',
      color: 'var(--orange)',
      body: 'Envia <code>PATCH /api/users?id=1</code> com <strong>apenas</strong> os campos alterados. Converte <code>age</code> para <code>Number</code> se presente.',
      detail: `export async function patchUser(apiUrl, id, fields) {\n  if (fields.age !== undefined) {\n    fields.age = Number(fields.age);\n  }\n\n  const response = await fetch(\`\${apiUrl}?id=\${id}\`, {\n    method: 'PATCH',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify(fields),\n  });\n\n  const data = await response.json();\n\n  if (!response.ok) {\n    throw new Error(data.error || 'Failed to patch user');\n  }\n\n  return data;\n}`,
    },
    {
      icon: '&#8644;', title: 'API responde', file: '',
      color: 'var(--orange)',

const flowEl = document.getElementById('flow');
const tabs = document.querySelectorAll('.method-tab');
let current = 'LOAD';

function render(method) {
  const steps = flows[method];
  flowEl.innerHTML = '';

  steps.forEach((s, i) => {
    if (i > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'arrow';
      arrow.innerHTML = '&#9660;';
      flowEl.appendChild(arrow);
    }

    const div = document.createElement('div');
    div.className = 'step';
    div.style.transitionDelay = `${i * 70}ms`;

    let inner = `
      <div class="step-card" style="--step-color:${s.color}">
        <div class="step-header">
          <div class="step-icon">${s.icon}</div>
          <div class="step-title">${s.title}</div>
          ${s.file ? `<div class="step-file">${s.file}</div>` : ''}
        </div>
        <div class="step-body">${s.body}</div>`;

    if (s.detail) {
      const uid = `detail-${method}-${i}`;
      inner += `
        <div class="toggle-detail" onclick="toggleDetail('${uid}',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5l7 7-7 7"/></svg>
          ver código
        </div>
        <div class="step-detail" id="${uid}"><span style="color:var(--muted)">${escHtml(s.detail)}</span></div>`;
    }

    if (s.response) {
      inner += `
        <div class="response-box">
          <div class="status">${s.response.status}</div>
          <pre>${escHtml(s.response.body)}</pre>
        </div>`;
    }

    inner += '</div>';
    div.innerHTML = inner;
    flowEl.appendChild(div);
  });

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.step').forEach(el => el.classList.add('visible'));
    });
  });
}

function toggleDetail(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  btn.classList.toggle('open');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    current = tab.dataset.method;
    render(current);
  });
});

render('LOAD');
</script>
